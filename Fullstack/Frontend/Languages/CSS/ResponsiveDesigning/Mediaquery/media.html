<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media</title>
</head>
<body>
<style>
    .box{
color:antiquewhite;
background-color: black;
font-size: 50px;
display: none;
 }
 @media (max-width:300px){
    #item-2{
        display: block;
    }
 }
 @media (min-width:301px) and (max-width:600px){
#item-2{
    display:block;
    background-color: gold;
    color: black;
}
 }
 @media (min-width:601px) and (max-width:900px){
    #item-3{
        display: block;
        background-color: navy;
        color: khaki;
    }
 }
 @media (min-width:901px){
    #item-4{
        display: block;
        background-color: darkgreen;
        color:gold;

    }
 }
</style>
    <div class="box" id="item-1">Small screen 0px 300px</div>
    <div class="box" id="item-2">Tab screen 301px 600px</div>
    <div class="box" id="item-3">Desktop screen 601px 900px</div>
    <div class="box" id="item-4">Large screen 901px </div>
    <a href="../../../../../../index.html"><h1>Go back to main page</h1></a>
</body>
</html>
