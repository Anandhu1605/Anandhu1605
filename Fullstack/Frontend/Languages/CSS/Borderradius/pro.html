    <title>Border Radius</title>

<body>

    <center>
        <h1>BORDER RADIUS</h1>
    </center>
    <style>
         #rectangle{background-color:yellow;width:400px; height: 200px; border-radius:20px;}
        #circle{background-color:green;width: 200px;height: 200px; border-radius: 50%;}
       
        #star{width: 300px;height: 200px;background-color:red;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);}
            #image{width: 300px;height: 300px; clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);;}






    </style>
     <div id="rectangle"></div>
    <div id="circle"></div>
   
    <div id="star"></div>
<img id="image" src="https://wallpapercave.com/wp/wp2740870.jpg" alt="">
